[HeartAttack]
; Fat value (0-1000) above which CJ is at risk of a fatal heart attack.
FatThreshold=700.0
; How often (in seconds) the game rolls the dice for BOTH heart attacks
; and heart palpitations.
CheckIntervalSeconds=8.0
; Chance per check (percent) right at FatThreshold.
BaseChancePercent=0.50
; Chance per check (percent) at maximum Fat (1000).
MaxChancePercent=4.00
; If 1, skip the check entirely while in ANY vehicle (car, bike, bicycle,
; boat, plane, helicopter, or train). If 0, it can trigger in a vehicle too.
OnlyOnFoot=1
; The rolled heart-attack chance is multiplied by this while CJ is sprinting.
SprintChanceMultiplier=2.00

[HeartPalpitations]
; Master on/off switch for the non-lethal "heart palpitation" event.
Enabled=1
; Fat value (0-1000) above which palpitations become possible. Usually
; lower than the fatal FatThreshold above, since this isn't lethal.
FatThreshold=400.0
; Chance per check (percent) right at FatThreshold.
BaseChancePercent=1.00
; Chance per check (percent) at maximum Fat (1000).
MaxChancePercent=6.00
; The rolled palpitation chance is multiplied by this while CJ is sprinting.
SprintChanceMultiplier=2.00
; When a palpitation occurs, CJ loses a random amount of health between
; these two values (in health points, same scale as the game's own health).
MinHealthLoss=5.0
MaxHealthLoss=25.0
; A palpitation will never reduce health below this floor (never lethal).
MinHealthAfter=10.0
; If 1, play a random CJ pain sound (compiled into this .asi) whenever a
; palpitation occurs. If 0, palpitations happen silently.
PlaySound=1
