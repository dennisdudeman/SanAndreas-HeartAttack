[HeartAttack]
; Fat value (0-1000) above which CJ is at risk of a heart attack.
FatThreshold=700.0
; How often (in seconds) the game rolls the dice.
CheckIntervalSeconds=8.0
; Chance per check (percent) right at FatThreshold.
BaseChancePercent=0.50
; Chance per check (percent) at maximum Fat (1000).
MaxChancePercent=4.00
; If 1, skip the check entirely while driving. If 0, it can happen in a car too.
OnlyOnFoot=1
; The rolled chance is multiplied by this while CJ is sprinting.
; e.g. 2.0 = twice as likely per check while sprinting.
SprintChanceMultiplier=2.00
